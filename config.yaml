# Radar Configuration
radar:
  product_id: IDR952  # Change this to your BoM Product ID
  timezone: Australia/Melbourne # Change this to your timezone
  # Optional: Override radar center coordinates (for composite/rainbow radars)
  # Uncomment and set these if your home marker appears in the wrong location
  # This is needed for some composite radars where the image isn't centered on the radar station
  #
  # To find the correct values:
  # 1. Enable residential_location below and set your home coordinates
  # 2. Generate a radar image and note where your home marker appears
  # 3. If it's too far east/west/north/south, adjust these coordinates in the opposite direction
  # 4. Each 1 degree ≈ 111km north/south, ≈ 89km east/west (at -37° latitude)
  #
  # Example for Melbourne area with Rainbow radar:
  # latitude: -37.0    # Try values between -36.0 and -38.0
  # longitude: 143.5   # Try values between 142.0 and 145.0
  # km_per_pixel: 2.0  # Should match your product_id (512km=4.0, 256km=2.0, 128km=1.0, 64km=0.5)

# Residential Location Marker (Optional)
# Adds a small house icon to the radar loop at the specified location
# Leave commented out or remove to disable
residential_location:
  enabled: false  # Set to true to enable the house marker
  latitude: -37.8136  # Your home latitude
  longitude: 144.9631  # Your home longitude
  # Note: The house icon will only appear on the animated radar loop, not on static images

# Scheduler Configuration - can be left untouched
scheduler:
  enabled: true
  update_interval: 600  # Seconds between updates (600 = 10 minutes)
  retry_on_error: true
  retry_interval: 60    # Seconds to wait before retry on error

# Home Assistant SMB Share Configuration
smb:
  server: 192.168.1.95 # CHANGE THIS !
  share: config
  username: username  # CHANGE THIS ! (Or use environment variable)
  password: password  # CHANGE THIS ! (Or use environment variable)
  remote_path: /www/bom_radar_downloader  # Create this directory on Home Assistant under /www

# Radar Layers - add or remove to your liking
layers:
  - background
#  - catchments
#  - topography
  - locations

# Output Configuration - can be left untouched
output:
  directory: /images
  animated_gif: radar_animated.gif
  timestamp_file: radar_last_update.txt
  legend_file: /IDR.legend.0.png

# GIF Settings - con be left untouched
gif:
  duration: 500  # Milliseconds per frame
  loop: 0        # 0 = infinite loop

# Logging
logging:

  level: INFO  # DEBUG, INFO, WARNING, ERROR
